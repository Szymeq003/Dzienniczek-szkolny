<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarządzanie Klasami - Dzienniczek</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container" style="padding: 3rem 0;">
        <a href="/admin" class="btn btn-ghost" style="margin-bottom: 2rem;">← Powrót do panelu admina</a>

        <div class="header" style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: start;">
            <div>
                <h1>Lista Klas Szkolnych</h1>
                <p class="text-muted">Struktura organizacyjna szkoły i opiekunowie.</p>
            </div>
            <a th:href="@{/admin/classes/add}" class="btn btn-primary">+ Dodaj Klasę</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nazwa Klasy</th>
                        <th>Nauczyciel (Wychowawca)</th>
                        <th>Liczba Uczniów</th>
                        <th>Akcje</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${classes}">
                        <td th:text="${c.id}"></td>
                        <td style="font-weight: 700; color: var(--primary);" th:text="${c.name}"></td>
                        <td th:text="${c.teacher != null ? c.teacher.firstName + ' ' + c.teacher.lastName : 'Brak wychowawcy'}"></td>
                        <td>
                            <span class="badge badge-success" th:text="${#lists.size(c.students)} + ' uczniów'"></span>
                        </td>
                        <td>
                            <div style="display: flex; gap: 0.5rem;">
                                <a th:href="@{/admin/students(classId=${c.id})}" class="btn btn-ghost" style="padding: 0.4rem 0.8rem;">Pokaż uczniów</a>
                                <a th:href="@{/admin/classes/edit/{id}(id=${c.id})}" class="btn btn-ghost" style="padding: 0.4rem 0.8rem;">Edytuj</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
