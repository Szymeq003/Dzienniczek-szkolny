<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - Dzienniczek Szkolny</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        body {
            background-image: 
                radial-gradient(at 0% 0%, rgba(2, 132, 199, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(5, 150, 105, 0.05) 0px, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
        }
        .logo-area { text-align: center; margin-bottom: 2.5rem; }
        .logo-area h1 { color: var(--primary); margin-bottom: 0.5rem; }
        .logo-area p { color: var(--text-muted); font-size: 0.875rem; }
    </style>
</head>
<body>

    <div class="card login-card">
        <div class="logo-area">
            <h1>E-Dzienniczek</h1>
            <p>Witaj z powrotem! Zaloguj się do systemu.</p>
        </div>

        <div th:if="${param.error}" class="error-msg" style="background: #fef2f2; color: #ef4444; padding: 0.75rem; border-radius: 0.75rem; font-size: 0.875rem; text-align: center; margin-bottom: 1.5rem; border: 1px solid #fee2e2;">
            Niepoprawny login lub hasło.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Login</label>
                <input type="text" id="username" name="username" class="input-control" placeholder="Twój login" required autofocus />
            </div>
            
            <div class="form-group">
                <label for="password">Hasło</label>
                <input type="password" id="password" name="password" class="input-control" placeholder="••••••••" required />
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Zaloguj się</button>
        </form>
    </div>

</body>
</html>
