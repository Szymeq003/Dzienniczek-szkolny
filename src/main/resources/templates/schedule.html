<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Dzienniczek'"></title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container" style="padding: 3rem 0;">
        <a href="javascript:history.back()" class="btn btn-ghost" style="margin-bottom: 2rem;">← Powrót</a>

        <div class="header" style="margin-bottom: 3rem;">
            <h1 th:text="${title}">Plan Lekcji</h1>
            <p class="text-muted">Szczegółowy harmonogram zajęć dydaktycznych dla wybranego oddziału lub nauczyciela.</p>
        </div>

        <div class="schedule-grid">
            <!-- Iterate through working days -->
            <div th:each="day : ${T(java.time.DayOfWeek).values()}" 
                 th:if="${day.value <= 5}"
                 class="day-column">
                
                <div class="day-header" th:text="${#messages.msgOrNull('day.' + day) ?: day}">PONIEDZIAŁEK</div>

                <div th:each="s : ${schedules}" th:if="${s.dayOfWeek == day}">
                    <div class="lesson-card">
                        <span class="lesson-time" th:text="${s.startTime + ' - ' + s.endTime}">08:00 - 08:45</span>
                        <span class="lesson-subject" th:text="${s.subject != null ? s.subject.name : 'Brak'}">Matematyka</span>
                        <div class="lesson-info">
                            <span class="badge badge-warning" style="padding: 0.15rem 0.5rem; font-size: 0.7rem;" 
                                  th:text="${s.room != null ? 'Sala ' + s.room.name : 'Brak sali'}">Sala 12</span>
                            <div style="margin-top: 0.5rem; font-style: italic;" 
                                 th:if="${entityType == 'class'}" 
                                 th:text="${s.subject != null && s.subject.teacher != null ? 'mgr ' + s.subject.teacher.lastName : 'Brak'}">
                                mgr Kowalski
                            </div>
                            <div style="margin-top: 0.5rem; font-weight: 600;" 
                                 th:if="${entityType == 'teacher'}" 
                                 th:text="${s.schoolClass != null ? 'Klasa ' + s.schoolClass.name : 'Brak'}">
                                Klasa 1A
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Placeholder for empty days -->
                <div th:if="${#lists.isEmpty(schedules.?[dayOfWeek == __${day}__])}" 
                     class="text-muted" style="text-align: center; padding: 2rem 0; font-size: 0.8rem;">
                    Brak zajęć
                </div>
            </div>
        </div>
    </div>
</body>
