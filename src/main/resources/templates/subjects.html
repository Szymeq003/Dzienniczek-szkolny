<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przedmioty - Zarządzanie</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container" style="padding: 3rem 0;">
        <a href="/admin" class="btn btn-ghost" style="margin-bottom: 2rem;">← Powrót do panelu admina</a>

        <div class="header" style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: start;">
            <div>
                <h1>Katalog Przedmiotów</h1>
                <p class="text-muted">Lista przedmiotów nauczanych w szkole.</p>
            </div>
            <a th:href="@{/admin/subjects/add}" class="btn btn-primary">+ Dodaj Przedmiot</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nazwa Przedmiotu</th>
                        <th>Nauczyciel Prowadzący</th>
                        <th>Akcje</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${subjects}">
                        <td th:text="${s.id}"></td>
                        <td style="font-weight: 700; color: var(--primary);" th:text="${s.name}"></td>
                        <td th:text="${s.teacher != null ? 'mgr ' + s.teacher.firstName + ' ' + s.teacher.lastName : 'Brak opiekuna'}"></td>
                        <td>
                            <div style="display: flex; gap: 0.5rem;">
                                <a th:href="@{/admin/subjects/edit/{id}(id=${s.id})}" class="btn btn-ghost" style="padding: 0.4rem 0.8rem;">Edytuj</a>
                                <a th:href="@{/admin/subjects/delete/{id}(id=${s.id})}" class="btn btn-danger" style="padding: 0.4rem 0.8rem;" onclick="return confirm('Spowoduje to usunięcie przedmiotu z planu. Jesteś pewny?');">Usuń</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
