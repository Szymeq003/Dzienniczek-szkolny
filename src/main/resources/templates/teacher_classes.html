<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Klasy - Dzienniczek</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg-light: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            padding: 3rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            font-weight: 800;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .class-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            border: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .class-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .class-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .class-info {
            color: var(--text-muted);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .badge {
            background: #ecfdf5;
            color: #059669;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-weight: 600;
            border: 1px solid #d1fae5;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
            font-weight: 500;
        }

        .back-btn:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <a href="/teacher/dashboard" class="back-btn">← Powrót do dashboardu</a>
                <h1>Moje Klasy</h1>
            </div>
        </div>

        <div class="grid">
            <a th:each="c : ${classes}" th:href="@{/teacher/class/{id}(id=${c.id})}" class="class-card">
                <div class="class-name" th:text="'Klasa ' + ${c.name}">Klasa 1A</div>
                <div class="class-info">
                    Uczniów: <span class="badge" th:text="${#lists.size(c.students)}">0</span>
                </div>
            </a>
            <div th:if="${#lists.isEmpty(classes)}" class="text-muted">
                Obecnie nie jesteś wychowawcą żadnej klasy.
            </div>
        </div>
    </div>

</body>
</html>
