<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edytuj Salę - Admin Dashboard</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span>Dzienniczek Admin</span>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="/admin">Dashboard</a></li>
                <li><a href="/admin/teachers">Nauczyciele</a></li>
                <li><a href="/admin/students">Uczniowie</a></li>
                <li><a href="/admin/classes">Klasy</a></li>
                <li><a href="/admin/subjects">Przedmioty</a></li>
                <li><a href="/admin/rooms" class="active">Sale</a></li>
            </ul>
        </nav>
        <form th:action="@{/logout}" method="post" style="margin-top: auto;">
            <button type="submit" class="btn btn-danger" style="width: 100%;">Wyloguj</button>
        </form>
    </aside>

    <main class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
        <div class="card" style="max-width: 500px; width: 100%;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">🏫</div>
                <h1 style="margin-bottom: 0.5rem;">Edycja Sali</h1>
                <p class="text-muted">Modyfikacja nazwy lub oznaczenia sali lekcyjnej.</p>
            </div>

            <form th:action="@{/admin/rooms/edit/{id}(id=${room.id})}" method="post" th:object="${room}">
                <div class="form-group">
                    <label>Nazwa Sali</label>
                    <input type="text" class="input-control" th:field="*{name}" placeholder="np. Sala 204" required />
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <a href="/admin/rooms" class="btn btn-ghost" style="flex: 1;">Anuluj</a>
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Zapisz Zmiany</button>
                </div>
            </form>
        </div>
    </main>
</body>
