<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edytuj Nauczyciela - Admin</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container" style="padding: 3rem 0; max-width: 600px;">
        <a href="/admin/teachers" class="btn btn-ghost" style="margin-bottom: 2rem;">← Powrót do listy</a>

        <div class="card">
            <h1 style="margin-bottom: 0.5rem;">Edytuj Dane Nauczyciela</h1>
            <p class="text-muted mb-4">Modyfikacja profilu pedagoga.</p>

            <form th:action="@{/admin/teachers/edit/{id}(id=${teacher.id})}" method="post" th:object="${teacher}">
                <div class="form-group">
                    <label>Imię</label>
                    <input type="text" class="input-control" th:field="*{firstName}" placeholder="Imię" required/>
                </div>
                <div class="form-group">
                    <label>Nazwisko</label>
                    <input type="text" class="input-control" th:field="*{lastName}" placeholder="Nazwisko" required/>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="input-control" th:field="*{email}" placeholder="email@szkola.pl" required/>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Zapisz Zmiany</button>
            </form>
        </div>
    </div>
</body>
