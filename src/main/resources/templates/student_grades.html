<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Szczegóły Ocen Przedmiotu</title>
</head>

<body>

    <nav>
        <a th:href="@{/teachers}">Nauczyciele</a> | 
        <a th:href="@{/students}">Uczniowie</a> | 
        <a th:href="@{/students/add}">Dodaj Ucznia</a> | 
        <a th:href="@{/classes}">Klasy</a>
    </nav>
    <hr />

    <h1 th:text="|Przedmiot: ${subject.name} - Uczeń: ${student.firstName} ${student.lastName}|">Szczegóły Ocen Przedmiotu</h1>


    <h3 th:if="${!#lists.isEmpty(grades)}">
        Średnia z przedmiotu: <span th:text="${#numbers.formatDecimal(average, 1, 2)}"></span>
    </h3>
    <h3 th:if="${#lists.isEmpty(grades)}">
        Brak ocen z tego przedmiotu, brak wyliczonej średniej.
    </h3>


    <fieldset style="display:inline-block; border: 1px solid #ccc; padding: 10px; margin-bottom: 20px;">
        <legend>Szybkie dodanie oceny</legend>
        <form th:action="@{/grades/add}" method="post" th:object="${newGrade}">
            <input type="hidden" name="studentId" th:value="${student.id}" />
            <input type="hidden" name="subjectId" th:value="${subject.id}" />
            
            <label>Ocena: 
                <select th:field="*{value}" required>
                    <option value="">- Wybierz -</option>
                    <option value="1">1</option>
                    <option value="1+">1+</option>
                    <option value="2-">2-</option>
                    <option value="2">2</option>
                    <option value="2+">2+</option>
                    <option value="3-">3-</option>
                    <option value="3">3</option>
                    <option value="3+">3+</option>
                    <option value="4-">4-</option>
                    <option value="4">4</option>
                    <option value="4+">4+</option>
                    <option value="5-">5-</option>
                    <option value="5">5</option>
                    <option value="5+">5+</option>
                    <option value="6-">6-</option>
                    <option value="6">6</option>
                </select>
            </label> &nbsp;
            
            <label>Data: <input type="date" th:field="*{date}" required /></label> &nbsp;
            
            <button type="submit">Dodaj</button>
        </form>
    </fieldset>

    <br /><br />


    <table border="1" style="min-width: 300px;">
        <thead>
            <tr>
                <th>Ocena</th>
                <th>Data Wpisania</th>
                <th>Akcje</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="g : ${grades}">
                <td th:text="${g.value}"></td>
                <td th:text="${g.date}"></td>
                <td>
                    <a th:href="@{/grades/edit/{id}(id=${g.id})}">Edytuj</a> | 
                    <a th:href="@{/grades/delete/{id}(id=${g.id})}" onclick="return confirm('Czy na pewno chcesz usunąć tę ocenę?');">Usuń</a>
                </td>
            </tr>
        </tbody>
    </table>

    <br />
    <a th:href="@{/grades/student/{studentId}(studentId=${student.id})}">Powrót do wyboru przedmiotów</a>

</body>

</html>
