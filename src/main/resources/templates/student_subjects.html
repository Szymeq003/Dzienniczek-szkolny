<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Zestawienie Ocen - Uczeń</title>
</head>

<body>

    <nav>
        <a th:href="@{/teachers}">Nauczyciele</a> | 
        <a th:href="@{/students}">Uczniowie</a> | 
        <a th:href="@{/students/add}">Dodaj Ucznia</a> | 
        <a th:href="@{/classes}">Klasy</a>
    </nav>
    <hr />

    <h1 th:text="|Tabela Ocen: ${student.firstName} ${student.lastName}|">Wybierz przedmiot</h1>
    <p>Poniżej znajdziesz zestawienie wszystkich przedmiotów wraz ze zdobytymi ocenami. Kliknij 'Szczegóły' aby dodać lub edytować pozycje:</p>

    <table border="1" style="min-width: 600px; text-align: center;">
        <thead>
            <tr>
                <th>Przedmiot</th>
                <th>Nauczyciel</th>
                <th>Oceny</th>
                <th>Średnia</th>
                <th>Akcja</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="summary : ${summaries}">
                <td th:text="${summary.subject.name}"></td>
                <td th:text="${summary.teacherInitials}" title="Inicjały Nauczyciela"></td>
                <td style="text-align: left; padding-left: 10px;">
                    <span th:each="g, iterStat : ${summary.grades}" th:text="!${iterStat.last} ? ${g.value} + ', ' : ${g.value}" style="font-weight: bold;"></span>
                    <span th:if="${#lists.isEmpty(summary.grades)}" style="color: gray; font-style: italic;">Brak ocen</span>
                </td>
                <td>
                    <span th:if="${summary.average > 0}" th:text="${#numbers.formatDecimal(summary.average, 1, 2)}"></span>
                    <span th:if="${summary.average == 0}">-</span>
                </td>
                <td>
                    <a th:href="@{/grades/student/{studentId}/subject/{subjectId}(studentId=${student.id}, subjectId=${summary.subject.id})}">Szczegóły</a>
                </td>
            </tr>
        </tbody>
    </table>

    <br />
    <a th:href="@{/students}">Powrót do listy uczniów</a>

</body>

</html>
