<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj Klasę - Admin</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container" style="padding: 3rem 0; max-width: 600px;">
        <a href="/admin/classes" class="btn btn-ghost" style="margin-bottom: 2rem;">← Powrót do listy</a>

        <div class="card">
            <h1 style="margin-bottom: 0.5rem;">Dodaj Nową Klasę</h1>
            <p class="text-muted mb-4">Zdefiniuj oddział klasowy i opcjonalnie przydziel wychowawcę.</p>

            <form th:action="@{/admin/classes/add}" method="post" th:object="${newClass}">
                <div class="form-group">
                    <label>Nazwa Klasy (np. 1A, 3B)</label>
                    <input type="text" class="input-control" th:field="*{name}" placeholder="Nazwa klasy" required/>
                </div>
                <div class="form-group">
                    <label>Wychowawca</label>
                    <select class="input-control" th:field="*{teacher}">
                        <option value="">-- Brak wychowawcy --</option>
                        <option th:each="t : ${teachers}" th:value="${t.id}" th:text="|${t.firstName} ${t.lastName}|"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Zapisz Klasę</button>
            </form>
        </div>
    </div>
</body>
