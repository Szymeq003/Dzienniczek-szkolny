<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Dodaj Klasę</title>
</head>

<body>

    <nav>
        <a th:href="@{/teachers}">Nauczyciele</a> | 
        <a th:href="@{/students}">Uczniowie</a> | 
        <a th:href="@{/students/add}">Dodaj Ucznia</a> | 
        <a th:href="@{/classes}">Klasy</a>
    </nav>
    <hr />

    <h1>Dodaj Klasę</h1>

    <form th:action="@{/classes/add}" method="post" th:object="${newClass}">
        <label>Nazwa klasy: <input type="text" th:field="*{name}" required /></label><br />
        
        <label>Wychowawca (Nauczyciel):
            <select th:field="*{teacher}">
                <option value="">-- Brak wychowawcy --</option>
                <option th:each="t : ${teachers}" th:value="${t.id}" th:text="|${t.firstName} ${t.lastName}|"></option>
            </select>
        </label><br />
        
        <button type="submit">Zapisz klasę</button>
    </form>

    <br />
    <a th:href="@{/classes}">Powrót do listy klas</a>

</body>

</html>
