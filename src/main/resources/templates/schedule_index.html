<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wybór Planu Lekcji - Admin</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container" style="padding: 3rem 0;">
        <a href="/admin" class="btn btn-ghost" style="margin-bottom: 2rem;">← Powrót do panelu admina</a>

        <div class="header" style="margin-bottom: 3rem;">
            <h1>Repozytorium Planów Lekcji</h1>
            <p class="text-muted">Przeglądaj harmonogramy wszystkich klas i nauczycieli.</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <!-- Classes Section -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span style="font-size: 1.5rem;">🏫</span> Plany Klas
                </h3>
                <ul style="list-style: none; padding: 0; display: flex; flex-direction: column; gap: 0.5rem;">
                    <li th:each="c : ${classes}">
                        <a th:href="@{/schedules/class/{id}(id=${c.id})}" 
                           class="btn btn-ghost" 
                           style="width: 100%; justify-content: flex-start; padding: 1rem;" 
                           th:text="${'Plan klasy: ' + c.name}"></a>
                    </li>
                    <li th:if="${#lists.isEmpty(classes)}" class="text-muted">Brak klas w bazie.</li>
                </ul>
            </div>

            <!-- Teachers Section -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
                    <span style="font-size: 1.5rem;">👨‍🏫</span> Plany Nauczycieli
                </h3>
                <ul style="list-style: none; padding: 0; display: flex; flex-direction: column; gap: 0.5rem;">
                    <li th:each="t : ${teachers}">
                        <a th:href="@{/schedules/teacher/{id}(id=${t.id})}" 
                           class="btn btn-ghost" 
                           style="width: 100%; justify-content: flex-start; padding: 1rem;" 
                           th:text="${'Plan nauczyciela: ' + t.firstName + ' ' + t.lastName}"></a>
                    </li>
                    <li th:if="${#lists.isEmpty(teachers)}" class="text-muted">Brak nauczycieli w bazie.</li>
                </ul>
            </div>
        </div>
    </div>
</body>
