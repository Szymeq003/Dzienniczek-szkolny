<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarządzanie Salami - Dzienniczek</title>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <div class="container" style="padding: 3rem 0;">
        <a href="/admin" class="btn btn-ghost" style="margin-bottom: 2rem;">← Powrót do panelu admina</a>

        <div class="header" style="margin-bottom: 3rem; display: flex; justify-content: space-between; align-items: start;">
            <div>
                <h1>Zasoby Szkoły - Sale Lekcyjne</h1>
                <p class="text-muted">Ewidencja sal i pracowni dydaktycznych.</p>
            </div>
        </div>

        <div class="card mb-4">
            <h3 style="margin-bottom: 1.5rem;">Dodaj Nową Salę</h3>
            <form th:action="@{/admin/rooms/add}" method="post" th:object="${newRoom}" style="display: flex; gap: 1rem; align-items: end;">
                <div class="form-group" style="margin-bottom: 0; flex: 1;">
                    <label>Numer / Nazwa Sali</label>
                    <input type="text" class="input-control" th:field="*{name}" placeholder="np. Sala Informatyczna 204" required/>
                </div>
                <button type="submit" class="btn btn-primary">Dodaj Salę</button>
            </form>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Oznaczenie Sali</th>
                        <th>Akcje</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${rooms}">
                        <td th:text="${r.id}" class="text-muted"></td>
                        <td style="font-weight: 700; font-size: 1.1rem; color: var(--primary);" th:text="${r.name}"></td>
                        <td>
                            <div style="display: flex; gap: 0.5rem;">
                                <a th:href="@{/admin/rooms/edit/{id}(id=${r.id})}" class="btn btn-ghost" style="padding: 0.4rem 0.8rem;">Edytuj</a>
                                <a th:href="@{/admin/rooms/delete/{id}(id=${r.id})}" class="btn btn-danger" style="padding: 0.4rem 0.8rem;"
                                    onclick="return confirm('Spowoduje to usunięcie sali z bazy. Kontynuować?');">Usuń</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(rooms)}">
                        <td colspan="3" class="text-muted">Brak zdefiniowanych sal.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
