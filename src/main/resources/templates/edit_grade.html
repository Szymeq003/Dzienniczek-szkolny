<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edytuj Ocenę</title>
</head>

<body>

    <nav>
        <a th:href="@{/teachers}">Nauczyciele</a> | 
        <a th:href="@{/students}">Uczniowie</a> | 
        <a th:href="@{/students/add}">Dodaj Ucznia</a> | 
        <a th:href="@{/classes}">Klasy</a>
    </nav>
    <hr />

    <h1 th:text="|Edytuj Ocenę z przedmiotu: ${grade.subject.name}|">Edytuj Ocenę</h1>

    <form th:action="@{/grades/edit/{id}(id=${grade.id})}" method="post" th:object="${grade}">
        
        <label>Ocena: 
                <select th:field="*{value}" required>
                    <option value="1">1</option>
                    <option value="1+">1+</option>
                    <option value="2-">2-</option>
                    <option value="2">2</option>
                    <option value="2+">2+</option>
                    <option value="3-">3-</option>
                    <option value="3">3</option>
                    <option value="3+">3+</option>
                    <option value="4-">4-</option>
                    <option value="4">4</option>
                    <option value="4+">4+</option>
                    <option value="5-">5-</option>
                    <option value="5">5</option>
                    <option value="5+">5+</option>
                    <option value="6-">6-</option>
                    <option value="6">6</option>
                </select>
        </label><br /><br />
        
        <label>Data wystawienia: 
            <input type="date" th:field="*{date}" required />
        </label><br /><br />
        
        <button type="submit">Zapisz Zmiany</button>
    </form>

    <br />
    <a th:href="@{/grades/student/{studentId}/subject/{subjectId}(studentId=${grade.student.id}, subjectId=${grade.subject.id})}">Powrót do listy ocen</a>

</body>

</html>
